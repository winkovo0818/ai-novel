name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit/API tests with coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    # pgvector image required for the embedding column type used by
    # MemoryChunk; the standard postgres:16 image lacks the extension.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ai_novel_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_novel_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ai_novel_e2e
      # LLM_MOCK=1 skips real DeepSeek calls — the mock returns deterministic
      # bibles + chapter prose so specs can assert on exact text.
      LLM_MOCK: "1"
      # Supabase isn't actually called during these flows (anonymous
      # onboarding works without auth), but the helpers must construct
      # a client. Placeholder URLs keep that lazy init from throwing.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
      MODEL_KEY_ENCRYPTION_SECRET: this-is-a-test-only-secret-do-not-use-in-prod
      # Disable production strictness so quota / moderation failures
      # default to allow under mock mode.
      QUOTA_FAILURE_MODE: allow
      MODERATION_FAILURE_MODE: allow

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            playwright-report
            test-results
          retention-days: 7
