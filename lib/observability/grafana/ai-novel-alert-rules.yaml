apiVersion: 1
groups:
  - orgId: 1
    name: ai-novel-production
    folder: AI Novel
    interval: 1m
    rules:
      - uid: ai-novel-llm-fail-rate-high
        title: AI Novel LLM fail rate > 5%
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                sum(rate(ai_novel_llm_requests_total{status="err"}[5m]))
                /
                clamp_min(sum(rate(ai_novel_llm_requests_total[5m])), 0.001)
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 10m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: LLM request failure rate is above 5% for 10 minutes.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-llm-success-rate-low
        title: AI Novel LLM success rate < 95%
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: ai_novel_llm_success_rate{window="15m"} and on() (sum(increase(ai_novel_llm_requests_total[15m])) > 5)
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.95]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 10m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: LLM success ratio over the last 15 minutes is below 95%.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-draft-sse-p95-high
        title: AI Novel draft SSE p95 > 8s
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: ai_novel_llm_took_ms_p95{route="/api/novels/[id]/chapters/draft",window="1h"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [8000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 15m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Chapter draft streaming p95 latency is above 8 seconds.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-draft-sse-failure-rate-high
        title: AI Novel draft SSE failure rate high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: ai_novel_draft_sessions_failure_rate{window="15m"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Draft SSE session failure ratio over the last 15 minutes is above 10%.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-draft-sse-active-high
        title: AI Novel draft SSE active sessions high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: ai_novel_draft_sessions_active{window="15m"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 10m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: More than five draft SSE sessions have stayed active in the last 15 minutes.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-daily-cost-high
        title: AI Novel 24h LLM cost high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: ai_novel_llm_cost_cny_window{window="24h"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [40]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: LLM cost over the last 24h is above 40 CNY.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-background-job-backlog-high
        title: AI Novel background job backlog high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(ai_novel_jobs_backlog{status=~"pending|running"})
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 15m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Pending and running background jobs have stayed above 20 for 15 minutes.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-background-job-failures
        title: AI Novel background job failures
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: increase(ai_novel_jobs_total{status="failed"}[15m])
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 1m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: At least one background job failed in the last 15 minutes.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-moderation-fallback-detected
        title: AI Novel moderation fallback detected
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(ai_novel_moderation_decisions_total{source="failure_mode",window="24h"}) or vector(0)
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 1m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Moderation used a failure-mode fallback at least once in the last 24 hours.
        labels:
          service: ai-novel
          severity: critical

      - uid: ai-novel-moderation-block-rate-high
        title: AI Novel moderation block rate high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: ai_novel_moderation_block_rate{window="15m"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 10m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Moderation block ratio over the last 15 minutes is above 20%.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-moderation-review-queue-high
        title: AI Novel moderation review queue high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: ai_novel_moderation_review_queue{review_status="pending"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [25]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 30m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Pending moderation review queue has stayed above 25 for 30 minutes.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-export-failure-rate-high
        title: AI Novel export failure rate high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 86400
              to: 0
            model:
              expr: ai_novel_exports_failure_rate{window="24h"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 15m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Export failure ratio over the last 24 hours is above 5%.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-background-job-backlog-stale
        title: AI Novel background job backlog stale
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: ai_novel_jobs_oldest_age_seconds{status="pending"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [600]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 10m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Oldest pending background job has been waiting for more than 10 minutes.
        labels:
          service: ai-novel
          severity: warning

      - uid: ai-novel-background-job-failure-rate-high
        title: AI Novel background job failure rate high
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: ai_novel_jobs_failure_rate{window="15m"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Background job failure ratio over the last 15 minutes is above 20%.
        labels:
          service: ai-novel
          severity: warning
