# Local development convenience only.
# - Loads credentials from `.env` (POSTGRES_PASSWORD); defaults are dev-grade.
# - Binds 5432 to 127.0.0.1 so the dev DB is never reachable from the LAN.
# - Production uses Supabase (or a managed Postgres). DO NOT deploy this file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-novel-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_novel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ai-novel-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_novel}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai-novel-pg-data:

