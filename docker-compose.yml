services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-novel-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_novel
    ports:
      - "5432:5432"
    volumes:
      - ai-novel-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_novel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai-novel-pg-data:
