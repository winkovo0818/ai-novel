# Local development convenience only.
# - Loads credentials from `.env` (POSTGRES_PASSWORD); defaults are dev-grade.
# - Binds 5432 to 127.0.0.1 so the dev DB is never reachable from the LAN.
# - Production uses Supabase (or a managed Postgres). DO NOT deploy this file.

services:
  app:
    build:
      context: .
    image: ai-novel-app
    container_name: ai-novel-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_novel?schema=public}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@postgres:5432/ai_novel?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-auth-secret}
      MODEL_KEY_ENCRYPTION_SECRET: ${MODEL_KEY_ENCRYPTION_SECRET:-change-me-to-a-random-32-char-secret-key}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      LLM_MOCK: ${LLM_MOCK:-1}
      QUOTA_FAILURE_MODE: ${QUOTA_FAILURE_MODE:-allow}
      MODERATION_FAILURE_MODE: ${MODERATION_FAILURE_MODE:-allow}
    ports:
      - "127.0.0.1:3000:3000"

  worker:
    image: ai-novel-app
    container_name: ai-novel-worker
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    command: ["npm", "run", "jobs:worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ai_novel?schema=public}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@postgres:5432/ai_novel?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-auth-secret}
      MODEL_KEY_ENCRYPTION_SECRET: ${MODEL_KEY_ENCRYPTION_SECRET:-change-me-to-a-random-32-char-secret-key}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      LLM_MOCK: ${LLM_MOCK:-1}
      QUOTA_FAILURE_MODE: ${QUOTA_FAILURE_MODE:-allow}
      MODERATION_FAILURE_MODE: ${MODERATION_FAILURE_MODE:-allow}
      JOBS_WORKER_POLL_MS: ${JOBS_WORKER_POLL_MS:-2000}

  postgres:
    image: postgres:16-alpine
    container_name: ai-novel-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_novel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ai-novel-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_novel}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai-novel-pg-data:
