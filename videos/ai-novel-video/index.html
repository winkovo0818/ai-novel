<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Novel — Product Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FDFDFC; }
    #stage {
      width: 1920px; height: 1080px;
      position: relative;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="stage" data-composition-id="main" data-width="1920" data-height="1080" data-start="0" data-duration="42.24"></div>

  <audio id="narration" src="narration.wav" data-start="0" data-duration="42.24" data-track-index="0" data-volume="1"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    var beats = [
      { id: "beat-1-spark", src: "compositions/beat-1-spark.html", start: 0, duration: 2.8 },
      { id: "beat-2-challenge", src: "compositions/beat-2-challenge.html", start: 3.0, duration: 5.0 },
      { id: "beat-3-solution", src: "compositions/beat-3-solution.html", start: 8.5, duration: 6.0 },
      { id: "beat-4-bible", src: "compositions/beat-4-bible.html", start: 15.0, duration: 6.0 },
      { id: "beat-5-agent", src: "compositions/beat-5-agent.html", start: 21.5, duration: 8.0 },
      { id: "beat-6-memory", src: "compositions/beat-6-memory.html", start: 30.0, duration: 12.0 },
    ];

    var stage = document.getElementById("stage");
    var mainTl = gsap.timeline();
    window.__timelines["main"] = mainTl;

    beats.forEach(function(beat) {
      var div = document.createElement("div");
      div.style.position = "absolute";
      div.style.inset = "0";
      div.id = beat.id;
      div.style.display = "none";
      stage.appendChild(div);

      fetch(beat.src)
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var parser = new DOMParser();
          var doc = parser.parseFromString(html, "text/html");
          var template = doc.querySelector("template");
          if (template) {
            div.innerHTML = template.innerHTML;
            var scripts = div.querySelectorAll("script");
            scripts.forEach(function(s) {
              if (s.src && !s.src.includes("gsap")) {
                var ns = document.createElement("script");
                ns.src = s.src;
                document.body.appendChild(ns);
              } else if (!s.src) {
                try { eval(s.textContent); } catch(e) {}
              }
            });
          }
        });

      mainTl.set("#" + beat.id, { display: "block" }, beat.start);
      mainTl.set("#" + beat.id, { display: "none" }, beat.start + beat.duration);
    });
  </script>
</body>
</html>
